name: Sondagem da API (manual)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/probe.mjs
        env:
          CIGAM_USER: ${{ secrets.CIGAM_USER }}
          CIGAM_PASS: ${{ secrets.CIGAM_PASS }}
          CIGAM_PORTAL: ${{ secrets.CIGAM_PORTAL }}
