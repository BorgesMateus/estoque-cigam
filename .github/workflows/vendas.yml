name: Coleta diária de vendas

on:
  schedule:
    - cron: "20 10 * * *"   # 10:20 UTC = 07:20 em Brasília
  workflow_dispatch:
    inputs:
      dias:
        description: "Reprocessar últimos N dias (999 = backfill completo)"
        required: false
        default: "3"

jobs:
  vendas:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Coletar vendas do CIGAM
        run: node scripts/vendas.mjs
        env:
          CIGAM_USER: ${{ secrets.CIGAM_USER }}
          CIGAM_PASS: ${{ secrets.CIGAM_PASS }}
          CIGAM_PORTAL: ${{ secrets.CIGAM_PORTAL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DIAS: ${{ github.event.inputs.dias || '3' }}
